<!DOCTYPE html>
<html>

<head>

    <title>Attendance Status</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial;
        }


        .card {

            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 20px #ccc;

        }


        .icon {

            font-size: 60px;
            color: green;

        }


        h1 {

            font-size: 30px;

        }


        button {

            background: black;
            color: white;
            padding: 12px 35px;
            border-radius: 15px;
            border: none;
            font-size: 18px;

        }
    </style>

</head>


<body>


    <div class="card">

        <div class="icon">
            ✅
        </div>


        <h1 id="title">
            Attendance Successful
        </h1>


        <p id="message">

        </p>


        <h3 id="time">

        </h3>


        <button onclick="goBack()">
            OK
        </button>


    </div>



    <script>


        const params = new URLSearchParams(window.location.search);


        let type = params.get("type");

        let time = params.get("time");



        if (type == "Exit") {

            document.getElementById("title").innerHTML =
                "Exit Successfully ✅";


            document.getElementById("message").innerHTML =
                "Library exit marked successfully";


        }

        else {


            document.getElementById("title").innerHTML =
                "Entry Successfully ✅";


            document.getElementById("message").innerHTML =
                "Library entry marked successfully";


        }



        document.getElementById("time").innerHTML =
            "Date & Time : " + time;



        function goBack() {

            window.history.go(-2);

            setTimeout(() => {
                window.location.href = "library_dashboard.html";
            }, 100);

        }


    </script>


</body>

</html>
