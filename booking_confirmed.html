<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Booking Confirmation - The Titans Library</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Work+Sans:wght@400&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#17324d",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#e9f1ff",
                        "on-tertiary-container": "#868474",
                        "on-primary-fixed": "#0f1c2c",
                        "surface-container": "#e5efff",
                        "outline": "#74777d",
                        "tertiary-fixed": "#e6e3d0",
                        "surface-tint": "#525f71",
                        "on-surface": "#001d36",
                        "on-primary-container": "#778598",
                        "on-primary-fixed-variant": "#3a4859",
                        "secondary-container": "#fed488",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#bac8dc",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#0f1c2c",
                        "surface": "#f8f9ff",
                        "secondary": "#775a19",
                        "on-surface-variant": "#44474c",
                        "on-secondary-fixed": "#261900",
                        "tertiary-container": "#1c1c11",
                        "surface-container-highest": "#d1e4ff",
                        "secondary-fixed": "#ffdea5",
                        "surface-variant": "#d1e4ff",
                        "surface-dim": "#c2dcff",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c4c6cc",
                        "on-tertiary-fixed": "#1c1c11",
                        "tertiary": "#000000",
                        "on-tertiary-fixed-variant": "#48473a",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#bac8dc",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#e9c176",
                        "primary": "#000000",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#eef4ff",
                        "surface-container-high": "#dbe9ff",
                        "surface-bright": "#f8f9ff",
                        "tertiary-fixed-dim": "#c9c7b5",
                        "on-secondary-container": "#785a1a",
                        "on-background": "#001d36",
                        "primary-fixed": "#d6e4f9",
                        "background": "#f8f9ff",
                        "on-secondary-fixed-variant": "#5d4201",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sm": "16px",
                        "margin-desktop": "80px",
                        "gutter": "24px",
                        "base": "4px",
                        "md": "24px",
                        "margin-mobile": "16px",
                        "lg": "40px",
                        "xs": "8px",
                        "xl": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-sm": ["Work Sans"],
                        "body-lg": ["Work Sans"],
                        "label-lg": ["JetBrains Mono"],
                        "label-md": ["JetBrains Mono"],

                    },
                    "fontSize": {

                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        .pulse-gold {
            animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-border {

            0%,
            100% {
                border-color: transparent;
            }

            50% {
                border-color: #C5A059;
            }
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 16px;
            background: #fed488;
            opacity: 0;
        }

        @media(max-width:640px) {

            main {
                max-height: none;
            }

            #seat-number,
            #shift-name,
            #shift-time,
            #booking-date {
                word-break: break-word;
            }

        }
    </style>
</head>

<body
    class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start md:justify-center p-4 md:p-margin-desktop relative overflow-x-hidden overflow-y-auto">
    <!-- Confetti Container for Micro-interaction -->
    <div class="absolute inset-0 pointer-events-none z-0" id="confetti-container"></div>
    <!-- Main Confirmation Card (Bento Style/Glassmorphism hybrid) -->
    <main
        class="relative z-10 w-full max-w-lg bg-surface-container-lowest border border-outline/20 rounded-xl shadow-[0_8px_24px_rgba(13,27,42,0.08)] p-4 sm:p-6 md:p-lg flex flex-col items-center text-center my-4">
        <!-- Success Icon -->
        <div
            class="w-16 h-16 sm:w-20 sm:h-20 bg-secondary-container rounded-full flex items-center justify-center mb-4 shadow-sm pulse-gold border-2 border-transparent">
            <span class="material-symbols-outlined text-on-secondary-container"
                style="font-size: 40px; font-variation-settings: 'FILL' 1;">
                check_circle
            </span>
        </div>
        <!-- Headline -->
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-primary mb-2">
            Booking Confirmed
        </h1>
        <p class="text-sm sm:text-base text-on-surface-variant mb-6">
            Your seat is reserved. Get ready to focus.
        </p>
        <!-- Details Grid (Bento style inner blocks) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full mb-6">
            <!-- Seat Detail -->
            <div
                class="bg-surface-container-low border border-outline/10 rounded-lg p-sm flex flex-col items-center justify-center hover:border-secondary transition-colors">
                <span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-base">Seat
                    Number</span>
                <div class="font-headline-md text-headline-md text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-secondary">event_seat</span>
                    <span id="seat-number">-</span>
                </div>
            </div>
            <!-- Shift Detail -->
            <div
                class="bg-surface-container-low border border-outline/10 rounded-lg p-sm flex flex-col items-center justify-center hover:border-secondary transition-colors">
                <span
                    class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-base">Shift</span>
                <div id="shift-name" class="text-base sm:text-lg font-semibold text-primary text-center break-words">
                    -
                </div>

                <div id="shift-time" class="font-label-md text-label-md text-on-surface-variant mt-1">
                    -
                </div>
            </div>
        </div>
        <!-- Meta Info -->
        <div
            class="bg-surface-container rounded-md py-xs px-sm w-full flex justify-between items-center mb-xl border border-outline-variant/30">
            <span class="font-body-sm text-body-sm text-on-surface-variant">Date</span>
            <span id="booking-date" class="font-label-lg text-label-lg text-on-surface font-semibold">
                -
            </span>
        </div>
        <!-- Actions -->
        <div class="flex flex-col w-full gap-3">
            <button
                class="flex-1 bg-secondary text-on-secondary font-label-lg text-label-lg py-sm px-md rounded-lg flex justify-center items-center gap-2 hover:bg-secondary/90 transition-colors shadow-sm">
                <span class="material-symbols-outlined">calendar_add_on</span>
                Add to Calendar
            </button>
            <button type="button" onclick="goToDashboard()"
                class="flex-1 bg-transparent border border-primary text-primary font-label-lg text-label-lg py-sm px-md rounded-lg flex justify-center items-center gap-2 hover:bg-primary/5 transition-colors">
                <span class="material-symbols-outlined">dashboard</span>
                View Dashboard
            </button>
        </div>
    </main>
    <script>
        function goToDashboard() {
            window.location.replace("library_dashboard.html");
        }
        // Lightweight Confetti Micro-interaction on load
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#fed488', '#17324d', '#bac8dc']; // secondary-container, inverse-surface, inverse-primary

            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');

                // Random properties
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const top = Math.random() * 50;
                const animDuration = 1.5 + Math.random() * 1.5;
                const animDelay = Math.random() * 0.5;

                confetti.style.backgroundColor = color;
                confetti.style.left = `${left}%`;
                confetti.style.top = `-${top}px`; // Start slightly above

                // Simple animation
                confetti.animate([
                    { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate3d(${Math.random() * 100 - 50}px, ${window.innerHeight + 50}px, 0) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: animDuration * 1000,
                    delay: animDelay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });

                container.appendChild(confetti);
            }
        });
        const API_URL = "https://the-titans.onrender.com";

        document.addEventListener("DOMContentLoaded", async () => {

            const email = localStorage.getItem("currentUserEmail");

            if (!email) {
                window.location.href = "index.html";
                return;
            }


            try {

                const response = await fetch(
                    `${API_URL}/user?email=${email}`
                );


                const data = await response.json();


                if (data.success) {

                    const booking = data.user.booking;


                    document.getElementById("seat-number").textContent =
                        booking.seat;


                    document.getElementById("shift-name").textContent =
                        booking.shift;


                    document.getElementById("shift-time").textContent =
                        booking.shift;


                    document.getElementById("booking-date").textContent =
                        booking.bookingDate;


                }

            }
            catch (error) {

                console.log(error);

            }

        });

    </script>
</body>

</html>
