        <script>

                // Login Check
                if (localStorage.getItem("isLoggedIn") !== "true") {
                        window.location.replace("index.html");
                }

                async function checkBookingAccess() {

                        try {

                                const email = localStorage.getItem("currentUserEmail");

                                if (!email) {
                                        window.location.replace("index.html");
                                        return;
                                }

                                const today = new Date();
                                today.setHours(0, 0, 0, 0);

                                // ==========================
                                // Check Local Storage First
                                // ==========================

                                let booking = localStorage.getItem("bookingData");

                                if (booking) {

                                        booking = JSON.parse(booking);

                                        const startDate = new Date(booking.startDate);
                                        startDate.setHours(0, 0, 0, 0);

                                        const endDate = new Date(booking.endDate);
                                        endDate.setHours(0, 0, 0, 0);

                                        console.log("Today's Date :", today);
                                        console.log("Start Date   :", startDate);
                                        console.log("End Date     :", endDate);

                                        // ==========================
                                        // Booking Expired
                                        // ==========================

                                        if (
                                                booking.status === "Booked" &&
                                                today > endDate
                                        ) {

                                                localStorage.removeItem("bookingData");
                                                window.location.replace("booking_expired.html");
                                                return;

                                        }

                                        // ==========================
                                        // Booking Confirmed but Not Started
                                        // ==========================

                                        if (
                                                booking.status === "Booked" &&
                                                today < startDate &&
                                                today < endDate
                                        ) {

                                                window.location.replace("booking_confirmed1.html");
                                                return;

                                        }

                                        // ==========================
                                        // Booking Active
                                        // ==========================

                                        if (
                                                booking.status === "Booked" &&
                                                today >= startDate &&
                                                today <= endDate
                                        ) {

                                                console.log("Access Granted (Local Storage)");
                                                return;

                                        }

                                        localStorage.removeItem("bookingData");

                                }

                                // ==========================
                                // Fetch Latest Data
                                // ==========================

                                const response = await fetch(
                                        "https://the-titans.onrender.com/user?email=" + encodeURIComponent(email)
                                );

                                const data = await response.json();

                                console.log(data);

                                if (!response.ok || !data.success) {

                                        window.location.replace("account_pending_approval.html");
                                        return;

                                }

                                if (!data.user || !data.user.booking) {

                                        window.location.replace("account_pending_approval.html");
                                        return;

                                }

                                booking = data.user.booking;

                                localStorage.setItem(
                                        "bookingData",
                                        JSON.stringify(booking)
                                );

                                const startDate = new Date(booking.startDate);
                                startDate.setHours(0, 0, 0, 0);

                                const endDate = new Date(booking.endDate);
                                endDate.setHours(0, 0, 0, 0);

                                console.log("Today's Date :", today);
                                console.log("Start Date   :", startDate);
                                console.log("End Date     :", endDate);

                                // ==========================
                                // Booking Expired
                                // ==========================

                                if (
                                        booking.status === "Booked" &&
                                        today > endDate
                                ) {

                                        localStorage.removeItem("bookingData");
                                        window.location.replace("booking_expired.html");
                                        return;

                                }

                                // ==========================
                                // Booking Confirmed but Not Started
                                // ==========================

                                if (
                                        booking.status === "Booked" &&
                                        today < startDate &&
                                        today < endDate
                                ) {

                                        window.location.replace("booking_confirmed1.html");
                                        return;

                                }

                                // ==========================
                                // Booking Active
                                // ==========================

                                if (
                                        booking.status === "Booked" &&
                                        today >= startDate &&
                                        today <= endDate
                                ) {

                                        console.log("Access Granted (Database)");
                                        return;

                                }

                                // ==========================
                                // Invalid / Pending Approval
                                // ==========================

                                localStorage.removeItem("bookingData");
                                window.location.replace("account_pending_approval.html");

                        }
                        catch (error) {

                                console.error("Booking Check Error:", error);
                                window.location.replace("account_pending_approval.html");

                        }

                }

                checkBookingAccess();

                function logoutUser() {

                        localStorage.clear();
                        sessionStorage.clear();

                        window.location.replace("index.html");

                }

        </script>

<script>
        let scanCompleted = false;
        async function onScanSuccess(decodedText, decodedResult) {

                if (scanCompleted) {
                        return;
                }


                scanCompleted = true;

                console.log("QR:", decodedText);


                if (decodedText !== "LIBRARY_ENTRY_QR") {

                        alert("Invalid QR Code");
                        return;

                }


                const email = localStorage.getItem("currentUserEmail");


                if (!email) {

                        alert("Login required");
                        return;

                }


                try {

                        let response = await fetch(
                                "https://the-titans.onrender.com/attendance",
                                {
                                        method: "POST",
                                        headers: {
                                                "Content-Type": "application/json"
                                        },
                                        body: JSON.stringify({
                                                email: email
                                        })
                                }
                        );


                        let data = await response.json();


                        console.log("Attendance Response:", data);


                        if (data.success) {


                                if (data.message === "Today's attendance already completed") {

                                        showErrorPopup(data.message);

                                        return;

                                }


                                const attendanceType = data.type;


                                const attendanceTime =
                                        data.exitTime ||
                                        data.entryTime ||
                                        new Date().toLocaleString();



                                window.location.href =
                                        `attendance_success.html?type=${attendanceType}&time=${encodeURIComponent(attendanceTime)}`;


                        }
                        else {

                                alert(data.message);

                        }

                }
                catch (error) {

                        console.log(error);
                        alert("Attendance API Error");

                }

        }

        function onScanFailure(error) {
                // Ignore scan errors
        }

        const html5QrCode = new Html5Qrcode("reader");

        // Pehle Back Camera open karne ki koshish
        html5QrCode.start(
                { facingMode: "environment" },
                {
                        fps: 10,
                        qrbox: {
                                width: 220,
                                height: 220
                        }
                },
                onScanSuccess,
                onScanFailure
        ).catch(err => {

                console.log("Back camera not found, trying available camera...");

                // Agar back camera na mile to available camera use kare
                Html5Qrcode.getCameras().then(devices => {

                        if (devices && devices.length) {

                                let cameraId = devices.find(device =>
                                        device.label.toLowerCase().includes("back") ||
                                        device.label.toLowerCase().includes("rear") ||
                                        device.label.toLowerCase().includes("environment")
                                )?.id || devices[devices.length - 1].id;

                                html5QrCode.start(
                                        cameraId,
                                        {
                                                fps: 10,
                                                qrbox: {
                                                        width: 220,
                                                        height: 220
                                                }
                                        },
                                        onScanSuccess,
                                        onScanFailure
                                );

                        } else {
                                console.error("No camera found.");
                        }

                }).catch(error => {
                        console.error("Camera error:", error);
                });

        });

        function showErrorPopup(message) {

                html5QrCode.stop().catch(err => {
                        console.log(err);
                });


                document.getElementById("errorMessage").innerHTML = message;


                document.getElementById("errorPopup")
                        .classList.remove("hidden");

        }



        function closeErrorPopup() {

                document.getElementById("errorPopup")
                        .classList.add("hidden");

        }
        function showAttendancePopup(title, message) {

                document.getElementById("popupTitle").innerHTML = title;

                document.getElementById("popupMessage").innerHTML = message;


                document.getElementById("attendancePopup")
                        .classList.remove("hidden");

        }



        function closeAttendancePopup() {

                document.getElementById("attendancePopup")
                        .classList.add("hidden");


        }
</script>
