<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex items-center justify-center">
    <div
        class="w-full max-w-md p-margin-mobile md:p-margin-desktop bg-surface-container-lowest rounded-xl shadow-md md:shadow-lg border border-outline-variant/30 flex flex-col gap-gutter">
        <!-- Header -->
        <div class="flex flex-col items-center gap-xs mb-md">
            <span class="material-symbols-outlined text-primary text-4xl mb-2"
                style="font-variation-settings: 'FILL' 1;">menu_book</span>
            <h1 class="text-headline-md font-headline-md text-primary text-center">The Titans Library</h1>
            <p class="text-body-md font-body-md text-on-surface-variant text-center">Enter your credentials to access
                your study sanctuary.</p>
        </div>
        <!-- Login Form -->
        <form id="login-form" class="flex flex-col gap-md">
            <div class="flex flex-col gap-base">
                <label class="text-label-md font-label-md text-on-surface" for="member-id">Member ID or Email</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
                    <input
                        class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline rounded focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors text-body-md font-body-md outline-none placeholder:text-outline-variant"
                        id="member-id" placeholder="e.g. titan_001" type="text" />
                </div>
            </div>
            <div class="flex flex-col gap-base">
                <div class="flex justify-between items-center">
                    <label class="text-label-md font-label-md text-on-surface" for="password">Password</label>
                    <a class="text-label-md font-label-md text-secondary hover:text-secondary-container transition-colors"
                        href="#" onclick="openDashboard()">
                        Forgot Password?
                    </a>
                </div>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
                    <input
                        class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline rounded focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors text-body-md font-body-md outline-none placeholder:text-outline-variant"
                        id="password" placeholder="••••••••" type="password" />
                </div>
            </div>
            <button
                class="w-full mt-4 py-3 bg-primary text-on-primary text-label-lg font-label-lg rounded hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200 active:scale-[0.98]"
                type="submit">
                Login
            </button>
        </form>
        <!-- Footer -->
        <div class="mt-sm text-center">
            <p class="text-body-sm font-body-sm text-on-surface-variant">
                Don't have an account?
                <a class="text-label-md font-label-md text-secondary hover:underline ml-1" href="sign_up.html">Sign
                    Up</a>
            </p>
        </div>
    </div>
</body>
<script>
    function openDashboard() {
        localStorage.setItem("isLoggedIn", "true");
        // store current email for profile lookups
        const memberId = document.getElementById('member-id').value;
        if (memberId) localStorage.setItem('currentUserEmail', memberId);
        window.location.replace("library_dashboard.html");
    }
    document.getElementById("login-form").addEventListener("submit", async function (event) {
        event.preventDefault();
        const memberId = document.getElementById("member-id").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch(
                "https://the-titans.onrender.com/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    memberId: memberId,
                    password: password
                })
            }
            );
            const data = await response.json();
            if (data.success) {

                localStorage.setItem("isLoggedIn", "true");

                if (data.role === "admin") {

                    window.location.replace("admin_dashboard.html");

                } else {

                    localStorage.setItem("currentUserEmail", data.user.email);
                    localStorage.setItem("userEmail", data.user.email);
                    localStorage.setItem("currentUser", JSON.stringify(data.user));

                    window.location.replace("library_dashboard.html");
                }
            } else {
                alert(data.message);
            }
        } catch (error) {
            console.error("Error during login:", error);
        }
    });
</script>
